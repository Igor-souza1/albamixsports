<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AlbaMix Sports</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#050505;
    color:white;
}

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a?q=80&w=2070&auto=format&fit=crop');
    
    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:900px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(12px);

    border-radius:30px;

    padding:50px;

    text-align:center;
}

h1{
    font-size:60px;
    margin-bottom:15px;
}

p{
    color:#d1d1d1;
    font-size:20px;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.buttons a{
    text-decoration:none;
    color:white;

    background:#25D366;

    padding:15px 35px;

    border-radius:12px;

    transition:0.3s;
}

.buttons a:hover{
    transform:scale(1.05);
}

.instagram{
    background:#E1306C !important;
}

@media(max-width:700px){

    h1{
        font-size:40px;
    }

    p{
        font-size:16px;
    }

    .card{
        padding:30px;
    }

}

</style>

</head>

<body>

<section class="hero">

<div class="card">

<h1>AlbaMix Sports</h1>

<p>
Camisas importadas premium para apaixonados por futebol.
</p>

<div class="buttons">

<a href="https://wa.me/5531991582223" target="_blank">
WhatsApp
</a>

<a class="instagram" href="https://instagram.com/" target="_blank">
Instagram
</a>

</div>

</div>

</section>

</body>
</html>
